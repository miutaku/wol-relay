name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  VPK_VERSION: 0.0.1589-ga2c5a97

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        shell: bash
        run: |
          diff="$(gofmt -l .)"
          if [ -n "$diff" ]; then
            echo "$diff"
            exit 1
          fi

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  nativegui:
    name: Native GUI Compile (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            goarch: amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GUI build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test native GUI packages
        run: go test -tags nativegui ./internal/nativegui ./cmd/wol-relay

      - name: Build native GUI app
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: go build -tags nativegui -o /tmp/wol-relay ./cmd/wol-relay

  windows-package:
    name: Windows Velopack Compile (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            package_suffix: amd64
            goarch: amd64
            runner: windows-latest
            runtime: win-x64
            cc: zig cc -target x86_64-windows-gnu
          - arch: arm64
            package_suffix: arm64
            goarch: arm64
            runner: windows-11-arm
            runtime: win-arm64
            cc: zig cc -target aarch64-windows-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        run: choco install zig -y

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk --version $env:VPK_VERSION

      - name: Build Windows app
        shell: pwsh
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          New-Item -ItemType Directory -Force -Path dist\velopack-input | Out-Null
          $env:GOARCH = "${{ matrix.goarch }}"
          $env:CGO_ENABLED = "1"
          $env:CC = "${{ matrix.cc }}"
          go build -tags nativegui -ldflags="-H=windowsgui" -o dist\velopack-input\wol-relay.exe .\cmd\wol-relay

      - name: Validate Velopack package
        shell: pwsh
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          Copy-Item LICENSE packaging\LICENSE.md
          vpk pack -H
          vpk pack `
            --packId wol-relay `
            --packVersion 0.0.1-ci `
            --packDir dist\velopack-input `
            --mainExe wol-relay.exe `
            --packTitle "wol-relay Wake on LAN" `
            --packAuthors miutaku `
            --outputDir dist\velopack-ci `
            --runtime "${{ matrix.runtime }}" `
            --channel "win-${{ matrix.arch }}" `
            --aumid miutaku.wol-relay.wake `
            --shortcuts Desktop,StartMenuRoot `
            --skipVeloAppCheck `
            --msi `
            --msiVersion 0.0.1 `
            --instLocation PerMachine `
            --instLicense packaging\LICENSE.md

  linux-package:
    name: Linux Package Compile (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            goarm: ""
            runner: ubuntu-latest
            tags: nativegui
            cgo: "1"
            deb_arch: amd64
            rpm_arch: x86_64
          - arch: arm64
            goarch: arm64
            goarm: ""
            runner: ubuntu-24.04-arm
            tags: nativegui
            cgo: "1"
            deb_arch: arm64
            rpm_arch: aarch64
          - arch: armv7
            package_suffix: armv7-headless
            goarch: arm
            goarm: "7"
            runner: ubuntu-latest
            tags: ""
            cgo: "0"
            deb_arch: armhf
            rpm_arch: armv7hl
          - arch: armv6
            package_suffix: armv6-headless
            goarch: arm
            goarm: "6"
            runner: ubuntu-latest
            tags: ""
            cgo: "0"
            deb_arch: armhf
            rpm_arch: armv6hl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GUI build dependencies
        if: matrix.tags == 'nativegui'
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev rpm

      - name: Install package build dependencies
        if: matrix.tags != 'nativegui'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install nFPM
        shell: bash
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build binary
        shell: bash
        env:
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          mkdir -p "dist/linux-${{ matrix.arch }}"
          if [ -n "${{ matrix.tags }}" ]; then
            go build -tags "${{ matrix.tags }}" -o "dist/linux-${{ matrix.arch }}/wol-relay" ./cmd/wol-relay
          else
            go build -o "dist/linux-${{ matrix.arch }}/wol-relay" ./cmd/wol-relay
          fi

      - name: Validate deb/rpm packages
        shell: bash
        env:
          VERSION: 0.0.1-ci
          ARTIFACT_ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist/packages
          sed "s|__ARTIFACT_ARCH__|${ARTIFACT_ARCH}|g" packaging/linux/nfpm.yaml > dist/nfpm-${ARTIFACT_ARCH}.yaml
          NFPM_ARCH="${{ matrix.deb_arch }}" nfpm package --config "dist/nfpm-${ARTIFACT_ARCH}.yaml" --packager deb --target "dist/packages/wol-relay_${VERSION}_linux_${{ matrix.package_suffix }}.deb"
          NFPM_ARCH="${{ matrix.rpm_arch }}" nfpm package --config "dist/nfpm-${ARTIFACT_ARCH}.yaml" --packager rpm --target "dist/packages/wol-relay_${VERSION}_linux_${{ matrix.package_suffix }}.rpm"

  macos-package:
    name: macOS DMG Compile (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: macos-26-intel
          - arch: arm64
            runner: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build DMG
        shell: bash
        env:
          GOARCH: ${{ matrix.arch }}
          VERSION: 0.0.1-ci
        run: ./packaging/build-macos-dmg.sh

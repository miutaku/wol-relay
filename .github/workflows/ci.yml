name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  VPK_VERSION: 0.0.1589-ga2c5a97

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        shell: bash
        run: |
          diff="$(gofmt -l .)"
          if [ -n "$diff" ]; then
            echo "$diff"
            exit 1
          fi

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  nativegui:
    name: Native GUI Compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GUI build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test native GUI packages
        run: go test -tags nativegui ./internal/nativegui ./cmd/wol-relay

      - name: Build native GUI app
        run: go build -tags nativegui -o /tmp/wol-relay ./cmd/wol-relay

  windows-package:
    name: Windows Velopack Compile
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW
        run: choco install mingw -y

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk --version $env:VPK_VERSION

      - name: Build Windows app
        shell: pwsh
        run: |
          $env:Path += ";C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin;$env:USERPROFILE\.dotnet\tools"
          New-Item -ItemType Directory -Force -Path dist\velopack-input | Out-Null
          go build -tags nativegui -ldflags="-H=windowsgui" -o dist\velopack-input\wol-relay.exe .\cmd\wol-relay

      - name: Validate Velopack package
        shell: pwsh
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          Copy-Item LICENSE packaging\LICENSE.md
          vpk pack -H
          vpk pack `
            --packId wol-relay `
            --packVersion 0.0.1-ci `
            --packDir dist\velopack-input `
            --mainExe wol-relay.exe `
            --packTitle wol-relay `
            --packAuthors miutaku `
            --outputDir dist\velopack-ci `
            --shortcuts Desktop,StartMenuRoot `
            --skipVeloAppCheck `
            --msi `
            --msiVersion 0.0.1 `
            --instLocation PerMachine `
            --instWelcome packaging\velopack-welcome.md `
            --instLicense packaging\LICENSE.md `
            --instReadme README.md `
            --instConclusion packaging\velopack-conclusion.md

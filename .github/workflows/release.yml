name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Velopack
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW
        run: choco install mingw -y

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk

      - name: Resolve version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          }
          $packageVersion = $version.TrimStart("v")
          "version=$version" >> $env:GITHUB_ENV
          "packageVersion=$packageVersion" >> $env:GITHUB_ENV

      - name: Build app
        shell: pwsh
        run: |
          $env:Path += ";C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin"
          New-Item -ItemType Directory -Force -Path dist\velopack-input | Out-Null
          go build -tags nativegui -ldflags="-H=windowsgui" -o dist\velopack-input\wol-relay.exe .\cmd\wol-relay

      - name: Build Velopack release
        shell: pwsh
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          vpk pack `
            --packId wol-relay `
            --packVersion "${{ env.packageVersion }}" `
            --packDir dist\velopack-input `
            --mainExe wol-relay.exe `
            --packTitle wol-relay `
            --packAuthors miutaku `
            --outputDir dist\windows-velopack `
            --shortcuts Desktop,StartMenuRoot `
            --skipVeloAppCheck `
            --msi `
            --instLocation PerMachine `
            --instWelcome packaging\velopack-welcome.md `
            --instLicense LICENSE `
            --instReadme README.md `
            --instConclusion packaging\velopack-conclusion.md

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows-release | Out-Null
          Copy-Item dist\windows-velopack\* dist\windows-release\
          if (Test-Path dist\velopack-input\wol-relay.exe) {
            Copy-Item dist\velopack-input\wol-relay.exe "dist\windows-release\wol-relay_${{ env.version }}_windows_amd64_portable.exe"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-velopack
          path: dist/windows-release/*

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GUI build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: bash
        run: |
          mkdir -p dist/linux-amd64
          go build -tags nativegui -o dist/linux-amd64/wol-relay ./cmd/wol-relay
          cp packaging/install-unix.sh packaging/uninstall-unix.sh README.md LICENSE dist/linux-amd64/

      - name: Package
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          fi
          tar -C dist -czf "dist/wol-relay_${version}_linux_amd64.tar.gz" linux-amd64
          echo "archive=dist/wol-relay_${version}_linux_amd64.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: ${{ env.archive }}


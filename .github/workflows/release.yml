name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        type: boolean
        default: true

permissions:
  contents: write

env:
  VPK_VERSION: 0.0.1589-ga2c5a97

jobs:
  build-windows:
    name: Build Windows Velopack (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            package_suffix: amd64
            goarch: amd64
            runner: windows-latest
            runtime: win-x64
            cc: zig cc -target x86_64-windows-gnu
          - arch: arm64
            package_suffix: arm64
            goarch: arm64
            runner: windows-11-arm
            runtime: win-arm64
            cc: zig cc -target aarch64-windows-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        run: choco install zig -y

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk --version $env:VPK_VERSION

      - name: Resolve version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          }
          $packageVersion = $version.TrimStart("v")
          $msiVersion = ($packageVersion -split "[-+]")[0]
          "version=$version" >> $env:GITHUB_ENV
          "packageVersion=$packageVersion" >> $env:GITHUB_ENV
          "msiVersion=$msiVersion" >> $env:GITHUB_ENV

      - name: Build app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\velopack-input | Out-Null
          $env:GOARCH = "${{ matrix.goarch }}"
          $env:CGO_ENABLED = "1"
          $env:CC = "${{ matrix.cc }}"
          go build -tags nativegui -ldflags="-H=windowsgui" -o dist\velopack-input\wol-relay.exe .\cmd\wol-relay

      - name: Build Velopack release
        shell: pwsh
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          Copy-Item LICENSE packaging\LICENSE.md
          vpk pack `
            --packId wol-relay `
            --packVersion "${{ env.packageVersion }}" `
            --packDir dist\velopack-input `
            --mainExe wol-relay.exe `
            --packTitle "wol-relay Wake on LAN" `
            --packAuthors miutaku `
            --outputDir dist\windows-velopack `
            --runtime "${{ matrix.runtime }}" `
            --channel "win-${{ matrix.arch }}" `
            --aumid miutaku.wol-relay.wake `
            --shortcuts Desktop,StartMenuRoot `
            --skipVeloAppCheck `
            --msi `
            --msiVersion "${{ env.msiVersion }}" `
            --instLocation PerMachine `
            --instLicense packaging\LICENSE.md

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows-release | Out-Null
          Get-ChildItem dist\windows-velopack | ForEach-Object {
            Copy-Item $_.FullName "dist\windows-release\wol-relay_${{ env.version }}_windows_${{ matrix.arch }}_$($_.Name)"
          }
          if (Test-Path dist\velopack-input\wol-relay.exe) {
            Copy-Item dist\velopack-input\wol-relay.exe "dist\windows-release\wol-relay_${{ env.version }}_windows_${{ matrix.arch }}_portable.exe"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: dist/windows-release/*

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            goarm: ""
            runner: ubuntu-latest
            tags: nativegui
            cgo: "1"
            deb_arch: amd64
            rpm_arch: x86_64
          - arch: arm64
            goarch: arm64
            goarm: ""
            runner: ubuntu-24.04-arm
            tags: nativegui
            cgo: "1"
            deb_arch: arm64
            rpm_arch: aarch64
          - arch: armv7
            package_suffix: armv7-headless
            goarch: arm
            goarm: "7"
            runner: ubuntu-latest
            tags: ""
            cgo: "0"
            deb_arch: armhf
            rpm_arch: armv7hl
          - arch: armv6
            package_suffix: armv6-headless
            goarch: arm
            goarm: "6"
            runner: ubuntu-latest
            tags: ""
            cgo: "0"
            deb_arch: armhf
            rpm_arch: armv6hl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GUI build dependencies
        if: matrix.tags == 'nativegui'
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev rpm

      - name: Install package build dependencies
        if: matrix.tags != 'nativegui'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install nFPM
        uses: goreleaser/nfpm-action@v2
        with:
          version: latest

      - name: Build
        shell: bash
        env:
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          mkdir -p "dist/linux-${{ matrix.arch }}"
          if [ -n "${{ matrix.tags }}" ]; then
            go build -tags "${{ matrix.tags }}" -o "dist/linux-${{ matrix.arch }}/wol-relay" ./cmd/wol-relay
          else
            go build -o "dist/linux-${{ matrix.arch }}/wol-relay" ./cmd/wol-relay
          fi
          cp README.md LICENSE "dist/linux-${{ matrix.arch }}/"

      - name: Package
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          fi
          package_version="${version#v}"
          echo "package_version=${package_version}" >> "$GITHUB_ENV"
          tar -C dist -czf "dist/wol-relay_${version}_linux_${{ matrix.package_suffix }}.tar.gz" "linux-${{ matrix.arch }}"
          echo "archive=dist/wol-relay_${version}_linux_${{ matrix.package_suffix }}.tar.gz" >> "$GITHUB_ENV"

      - name: Build deb/rpm packages
        shell: bash
        env:
          VERSION: ${{ env.package_version }}
          ARTIFACT_ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist/packages
          NFPM_ARCH="${{ matrix.deb_arch }}" nfpm package --config packaging/linux/nfpm.yaml --packager deb --target "dist/packages/wol-relay_${VERSION}_linux_${{ matrix.package_suffix }}.deb"
          NFPM_ARCH="${{ matrix.rpm_arch }}" nfpm package --config packaging/linux/nfpm.yaml --packager rpm --target "dist/packages/wol-relay_${VERSION}_linux_${{ matrix.package_suffix }}.rpm"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            ${{ env.archive }}
            dist/packages/*

  build-macos:
    name: Build macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: macos-26-intel
          - arch: arm64
            runner: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          fi
          echo "version=${version}" >> "$GITHUB_ENV"
          echo "package_version=${version#v}" >> "$GITHUB_ENV"

      - name: Build DMG
        shell: bash
        env:
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION="${package_version}" ./packaging/build-macos-dmg.sh
          echo "dmg=dist/wol-relay_${package_version}_darwin_${GOARCH}.dmg" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.arch }}
          path: ${{ env.dmg }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-macos
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve version
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          fi
          echo "version=${version}" >> "$GITHUB_ENV"

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.version }}
          name: wol-relay ${{ env.version }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          files: dist/*

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        type: boolean
        default: true

permissions:
  contents: write

env:
  VPK_VERSION: 0.0.1589-ga2c5a97

jobs:
  build-windows:
    name: Build Windows Velopack
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW
        run: choco install mingw -y

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk --version $env:VPK_VERSION

      - name: Resolve version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          }
          $packageVersion = $version.TrimStart("v")
          $msiVersion = ($packageVersion -split "[-+]")[0]
          "version=$version" >> $env:GITHUB_ENV
          "packageVersion=$packageVersion" >> $env:GITHUB_ENV
          "msiVersion=$msiVersion" >> $env:GITHUB_ENV

      - name: Build app
        shell: pwsh
        run: |
          $env:Path += ";C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin"
          New-Item -ItemType Directory -Force -Path dist\velopack-input | Out-Null
          go build -tags nativegui -ldflags="-H=windowsgui" -o dist\velopack-input\wol-relay.exe .\cmd\wol-relay

      - name: Build Velopack release
        shell: pwsh
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          Copy-Item LICENSE packaging\LICENSE.md
          vpk pack `
            --packId wol-relay `
            --packVersion "${{ env.packageVersion }}" `
            --packDir dist\velopack-input `
            --mainExe wol-relay.exe `
            --packTitle "wol-relay Wake on LAN" `
            --packAuthors miutaku `
            --outputDir dist\windows-velopack `
            --aumid miutaku.wol-relay.wake `
            --shortcuts Desktop,StartMenuRoot `
            --skipVeloAppCheck `
            --msi `
            --msiVersion "${{ env.msiVersion }}" `
            --instLocation PerMachine `
            --instLicense packaging\LICENSE.md

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows-release | Out-Null
          Copy-Item dist\windows-velopack\* dist\windows-release\
          if (Test-Path dist\velopack-input\wol-relay.exe) {
            Copy-Item dist\velopack-input\wol-relay.exe "dist\windows-release\wol-relay_${{ env.version }}_windows_amd64_portable.exe"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-velopack
          path: dist/windows-release/*

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GUI build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev rpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install nFPM
        uses: goreleaser/nfpm-action@v2
        with:
          version: latest

      - name: Build
        shell: bash
        run: |
          mkdir -p dist/linux-amd64
          go build -tags nativegui -o dist/linux-amd64/wol-relay ./cmd/wol-relay
          cp README.md LICENSE dist/linux-amd64/

      - name: Package
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          fi
          package_version="${version#v}"
          echo "package_version=${package_version}" >> "$GITHUB_ENV"
          tar -C dist -czf "dist/wol-relay_${version}_linux_amd64.tar.gz" linux-amd64
          echo "archive=dist/wol-relay_${version}_linux_amd64.tar.gz" >> "$GITHUB_ENV"

      - name: Build deb/rpm packages
        shell: bash
        env:
          VERSION: ${{ env.package_version }}
        run: |
          mkdir -p dist/packages
          nfpm package --config packaging/linux/nfpm.yaml --packager deb --target "dist/packages/wol-relay_${VERSION}_linux_amd64.deb"
          nfpm package --config packaging/linux/nfpm.yaml --packager rpm --target "dist/packages/wol-relay_${VERSION}_linux_amd64.rpm"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            ${{ env.archive }}
            dist/packages/*

  build-macos:
    name: Build macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: macos-26-intel
          - arch: arm64
            runner: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          fi
          echo "version=${version}" >> "$GITHUB_ENV"
          echo "package_version=${version#v}" >> "$GITHUB_ENV"

      - name: Build DMG
        shell: bash
        env:
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION="${package_version}" ./packaging/build-macos-dmg.sh
          echo "dmg=dist/wol-relay_${package_version}_darwin_${GOARCH}.dmg" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.arch }}
          path: ${{ env.dmg }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-macos
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve version
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          fi
          echo "version=${version}" >> "$GITHUB_ENV"

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.version }}
          name: wol-relay ${{ env.version }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          files: dist/*

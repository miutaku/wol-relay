name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64 gcc libgl1-mesa-dev xorg-dev zip

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: sh ./packaging/build-windows.sh

      - name: Package
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          fi
          archive="wol-relay_${version}_windows_amd64.zip"
          (cd dist/windows-amd64 && zip -r "../${archive}" .)
          echo "archive=dist/${archive}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: ${{ env.archive }}

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GUI build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: bash
        run: |
          mkdir -p dist/linux-amd64
          go build -tags nativegui -o dist/linux-amd64/wol-relay ./cmd/wol-relay
          cp packaging/install-unix.sh packaging/uninstall-unix.sh README.md LICENSE dist/linux-amd64/

      - name: Package
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          fi
          tar -C dist -czf "dist/wol-relay_${version}_linux_amd64.tar.gz" linux-amd64
          echo "archive=dist/wol-relay_${version}_linux_amd64.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: ${{ env.archive }}

